<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的作品集</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-text { 
            background: linear-gradient(135deg, #2563eb, #9333ea); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .work-card { 
            transition: all 0.3s; 
            cursor: pointer; 
        }
        .work-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
        }
        .work-card img { 
            transition: transform 0.5s; 
        }
        .work-card:hover img { 
            transform: scale(1.1); 
        }
        .lightbox { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            z-index: 100; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        .lightbox.active { 
            display: flex; 
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 顶部导航 -->
    <header class="fixed top-0 w-full bg-white/90 backdrop-blur shadow-sm z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <span class="text-xl font-bold gradient-text">我的作品集</span>
            <nav class="space-x-6">
                <a href="#works" class="text-gray-700 hover:text-blue-600">作品</a>
                <a href="#about" class="text-gray-700 hover:text-blue-600">关于</a>
                <a href="#contact" class="text-gray-700 hover:text-blue-600">联系</a>
            </nav>
        </div>
    </header>

    <!-- 首页 -->
    <section class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-purple-50 pt-16">
        <div class="text-center px-4">
            <span class="inline-block px-4 py-2 bg-blue-100 text-blue-700 rounded-full text-sm mb-6">欢迎来到我的作品集</span>
            <h1 class="text-5xl md:text-7xl font-bold mb-4">我是 <span class="gradient-text">创作者</span></h1>
            <p class="text-xl text-gray-600 mb-8">平面设计师 / UI设计师 / 摄影师</p>
            
            <!-- 两个按钮：查看作品 + 抖音 -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                <a href="#works" class="px-8 py-4 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition shadow-lg hover:shadow-xl">查看作品 ↓</a>
                
                <!-- 抖音按钮 - 已填入你的真实主页链接 -->
                <a href="https://www.douyin.com/user/MS4wLjABAAAA5GkI3A7XP9Fob8TQ_tR7TbAWPfVo97QZqwS3BHfPsPtWILNwery6PC-F2ell-2E-" target="_blank" class="px-8 py-4 bg-black text-white rounded-full hover:bg-gray-800 transition flex items-center gap-2 shadow-lg hover:shadow-xl">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="white">
                        <path d="M12.53.02C13.84 0 15.14.01 16.44 0c.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/>
                    </svg>
                    抖音：Jieeeeee
                </a>
            </div>
        </div>
    </section>

    <!-- 作品展示 -->
    <section id="works" class="py-20 px-4 max-w-7xl mx-auto">
        <h2 class="text-4xl font-bold text-center mb-4 gradient-text">精选作品</h2>
        <p class="text-gray-600 text-center mb-12">点击作品查看大图</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- 作品1 -->
            <div class="work-card bg-white rounded-2xl overflow-hidden shadow-sm" onclick="openLightbox('./images/work1.jpg', '品牌视觉设计')">
                <div class="h-64 overflow-hidden">
                    <img src="./images/work1.jpg" alt="作品1" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/800x600?text=请放入照片work1.jpg'">
                </div>
                <div class="p-6">
                    <span class="text-blue-600 text-sm font-medium">平面设计</span>
                    <h3 class="text-xl font-bold mt-2 text-gray-800">品牌视觉设计</h3>
                    <p class="text-gray-600 text-sm mt-2">企业VI设计全套方案</p>
                </div>
            </div>

            <!-- 作品2 -->
            <div class="work-card bg-white rounded-2xl overflow-hidden shadow-sm" onclick="openLightbox('./images/work2.jpg', 'APP界面设计')">
                <div class="h-64 overflow-hidden">
                    <img src="./images/work2.jpg" alt="作品2" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/800x600?text=请放入照片work2.jpg'">
                </div>
                <div class="p-6">
                    <span class="text-blue-600 text-sm font-medium">UI设计</span>
                    <h3 class="text-xl font-bold mt-2 text-gray-800">APP界面设计</h3>
                    <p class="text-gray-600 text-sm mt-2">移动端电商应用界面</p>
                </div>
            </div>

            <!-- 作品3 -->
            <div class="work-card bg-white rounded-2xl overflow-hidden shadow-sm" onclick="openLightbox('./images/work3.jpg', '城市摄影')">
                <div class="h-64 overflow-hidden">
                    <img src="./images/work3.jpg" alt="作品3" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/800x600?text=请放入照片work3.jpg'">
                </div>
                <div class="p-6">
                    <span class="text-blue-600 text-sm font-medium">摄影</span>
                    <h3 class="text-xl font-bold mt-2 text-gray-800">城市摄影</h3>
                    <p class="text-gray-600 text-sm mt-2">都市建筑风光记录</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 关于我 -->
    <section id="about" class="py-20 bg-white">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <h2 class="text-4xl font-bold mb-8 gradient-text">关于我</h2>
            <p class="text-gray-600 text-lg leading-relaxed max-w-2xl mx-auto">我是一名热爱创意与设计的视觉创作者，专注于平面设计、UI设计和摄影领域。</p>
        </div>
    </section>

    <!-- 联系我 -->
    <section id="contact" class="py-20 bg-gray-900 text-white text-center">
        <h2 class="text-4xl font-bold mb-4">联系我</h2>
        <p class="text-gray-400 mb-8">有项目合作？欢迎随时联系</p>
        <a href="mailto:hello@example.com" class="px-8 py-4 bg-blue-600 rounded-full hover:bg-blue-700 transition inline-block">发送邮件</a>
    </section>

    <!-- 图片放大查看 -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <button class="absolute top-4 right-6 text-white text-5xl hover:text-gray-300">&times;</button>
        <div class="max-w-5xl w-full px-4" onclick="event.stopPropagation()">
            <img id="lightbox-img" src="" class="w-full rounded-lg shadow-2xl">
            <p id="lightbox-title" class="text-white text-center mt-4 text-xl"></p>
        </div>
    </div>

    <!-- 脚本 -->
    <script>
        function openLightbox(src, title) { 
            document.getElementById('lightbox-img').src = src; 
            document.getElementById('lightbox-title').textContent = title; 
            document.getElementById('lightbox').classList.add('active'); 
            document.body.style.overflow = 'hidden'; 
        }
        
        function closeLightbox() { 
            document.getElementById('lightbox').classList.remove('active'); 
            document.body.style.overflow = 'auto'; 
        }
        
        document.addEventListener('keydown', (e) => { 
            if (e.key === 'Escape') closeLightbox(); 
        });
    </script>
</body>
</html>
